<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Driving Car Simulator</title>
    <meta name="description" content="A beginner-friendly JavaScript and Canvas self-driving car simulator.">
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <h1 class="app-title">Self-Driving Car Simulator</h1>
            <p class="app-subtitle">A neural network & physics-based driving environment</p>
        </header>

        <main class="simulator-layout">
            <!-- Canvas Container for centering and premium framing -->
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="carCanvas"></canvas>
            </div>
            
            <!-- Future dashboard/controls panel placeholder -->
            <div class="controls-panel" id="controlsPanel">
                <div class="panel-header">
                    <h2>Simulator Info</h2>
                </div>
                <div class="panel-body">
                    <p class="placeholder-text">Canvas is initialized and ready for development. Control configurations, neural net visualizer, and physics stats will appear here.</p>
                </div>
            </div>
        </main>
        
        <footer class="app-footer">
            <p>Created as a beginner-friendly simulation setup</p>
        </footer>
    </div>

    <script src="road.js"></script>
    <script src="car.js"></script>
    <script src="script.js"></script>
</body>
</html>
